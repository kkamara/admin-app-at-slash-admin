<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="description" content="Experience the thrill of gaming in a whole new way - secure, intuitive, and designed for ultimate entertainment.">
    <title>Admin</title>
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json">
    <link rel="shortcut icon" href="%PUBLIC_URL%/favicon.png" type="image/png">
    <!-- Fonts and icons -->
    <script src="/admin/dashboard/js/plugin/webfont/webfont.min.js"></script>
    <script>
      WebFont.load({

        custom: {"families":["Font Awesome 5 Solid", "Font Awesome 5 Regular", "Font Awesome 5 Brands", "simple-line-icons"], urls: ['/admin/dashboard/css/fonts.min.css']},
        active: function() {
          sessionStorage.fonts = true;
        }
      });

    <!-- CSS Files -->
    <link rel="stylesheet" href="/admin/dashboard/css/bootstrap.min.css">
    <link rel="stylesheet" href="/admin/dashboard/css/plugins.min.css">

      You need to enable JavaScript to run this app.

    <div id="app"></div>
    <!--   Core JS Files   -->
    <script type="text/javascript" src="/admin/dashboard/js/core/jquery-3.7.1.min.js"></script>
